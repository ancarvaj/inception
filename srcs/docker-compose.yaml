services:
  mariadb:
    build:
      context: requirements/mariadb/
      dockerfile: Dockerfile
    image: mariadb:stable
    container_name: mariadb
    networks:
      - private
    env_file: .env
    restart: always
    volumes:
      - mariadb:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost", "-u", "root", "-p$${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 5

  wordpress:
    build:
      context: requirements/wordpress/
      dockerfile: Dockerfile
    image: wordpress:stable
    container_name: wordpress
    restart: always
    env_file: .env
    networks:
      - private
      - public
    depends_on:
      mariadb:
        condition: service_healthy
    volumes:
      - wordpress:/var/www/html

  nginx:
    build:
      context: requirements/nginx/
      dockerfile: Dockerfile
    image: nginx:stable
    container_name: nginx
    restart: always
    networks:
      - public
    depends_on:
      - wordpress
    volumes:
      - wordpress:/var/www/html
    ports:
      - "8080:80"

networks:
  private:
    driver: bridge
    internal: true
  public:
    driver: bridge

volumes:
  wordpress:
    driver: local
    driver_opts:
      type: none
      device: ${HOME}/data/wordpress
      o: bind
  mariadb:
    driver: local
    driver_opts:
      type: none
      device: ${HOME}/data/mariadb
      o: bind
